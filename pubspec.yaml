name: boksklapps
description: Boxing Cardio App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  cloud_firestore: ^4.3.1
  cupertino_icons: ^1.0.3
  firebase_analytics: ^10.1.0
  firebase_auth: ^4.2.5
  firebase_core: ^2.4.1
  firebase_storage: ^11.0.14
  flex_color_scheme: ^7.0.0-dev.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.0.0
  flutter_riverpod: ^2.1.3
  google_fonts: ^4.0.1
  just_audio: ^0.9.31
  logger: ^1.1.0  
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/GIF/
    - assets/PNG/
    - assets/MP3/Arnold/
    - assets/MP3/DTMF/
    - assets/MP3/Elli/
    - assets/MP3/Sound/
